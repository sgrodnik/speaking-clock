<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Говорящие часы</title>
    <style>
        /* CSS-переменные для легкого переключения тем */
        :root {
            /* Авто/Светлая тема (по умолчанию) */
            --bg-color: #f5f5f5;
            --text-color: #111;
            --border-color: #ccc;
            --muted-color: #666;
            --btn-hover: #e0e0e0;
        }

        /* Темная тема по умолчанию для темного режима */
        :root.theme-dark {
            --bg-color: #111;
            --text-color: #eee;
            --border-color: #444;
            --muted-color: #888;
            --btn-hover: #333;
        }

        /* Мягкий режим для светлой темы */
        :root.soft-mode {
            --bg-color: #eae6df; /* мягкий теплый фон сепии */
            --text-color: #4a4740; /* приглушенный темно-серый */
            --border-color: #cdc7bd;
            --muted-color: #8c8577;
            --btn-hover: #dfd9ce;
        }

        /* Мягкий режим для темной темы */
        :root.theme-dark.soft-mode {
            --bg-color: #1e1e1e; /* не такой глубокий черный */
            --text-color: #aba49c; /* мягкий приглушенный серый */
            --border-color: #383838;
            --muted-color: #706d68;
            --btn-hover: #292929;
        }

        body {
            font-family: monospace;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-size: 1.2rem;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        main {
            border: 1px dashed var(--border-color);
            padding: 30px;
            text-align: center;
            min-width: 320px;
            max-width: 450px;
            background: transparent;
        }
        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .controls {
            margin: 25px 0;
        }
        .control-group {
            margin-bottom: 15px;
        }
        #countdown {
            font-size: 3rem;
            margin: 20px 0;
            color: var(--muted-color);
            font-weight: bold;
        }
        #subtitle {
            font-size: 1rem;
            color: var(--muted-color);
            margin-bottom: 15px;
            min-height: 1.2em;
        }
        #quote-container {
            font-size: 0.95rem;
            font-style: italic;
            border-top: 1px dashed var(--border-color);
            margin-top: 25px;
            padding-top: 20px;
            color: var(--muted-color);
            line-height: 1.4;
        }
        #quote-author {
            display: block;
            margin-top: 5px;
            font-size: 0.85rem;
            font-weight: bold;
            text-align: right;
        }
        input, select {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px;
            font-family: monospace;
            font-size: 1.1rem;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        input[type="number"] {
            width: 60px;
            text-align: center;
        }
        input[type="checkbox"] {
            transform: scale(1.3);
            vertical-align: middle;
            margin-right: 5px;
            cursor: pointer;
        }
        button {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            font-family: monospace;
            font-size: 1.2rem;
            cursor: pointer;
            margin: 5px;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        button:hover:not(:disabled) {
            background: var(--btn-hover);
        }
        button:disabled {
            color: var(--muted-color);
            border-color: var(--border-color);
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <main>
        <h2>Говорящие часы</h2>
        
        <div class="controls">
            <div class="control-group">
                <label>Тема: 
                    <select id="themeSelect">
                        <option value="auto">Авто</option>
                        <option value="light">День</option>
                        <option value="dark">Ночь</option>
                    </select>
                </label>
            </div>
            <div class="control-group">
                <label>
                    <input type="checkbox" id="softModeCheckbox">
                    Мягкий режим
                </label>
            </div>
            <div class="control-group">
                <label>Язык: 
                    <select id="lang">
                        <option value="ru" selected>Русский</option>
                        <option value="en">English</option>
                        <option value="es">Español</option>
                    </select>
                </label>
            </div>
            <div class="control-group">
                <label>Интервал (мин): <input type="number" id="interval" value="1" min="1"></label>
            </div>
            <div class="control-group">
                <label>
                    <input type="checkbox" id="syncToMinute" checked>
                    Синхронизировать в 00 сек.
                </label>
            </div>
        </div>

        <div id="countdown">--:--</div>
        <div id="subtitle"></div>

        <div>
            <button id="startBtn">Старт</button>
            <button id="stopBtn" disabled>Стоп</button>
        </div>

        <!-- Контейнер для цитаты -->
        <div id="quote-container" style="display: none;">
            <span id="quote-text">Загрузка цитаты...</span>
            <span id="quote-author"></span>
        </div>
    </main>

    <script>
        let timerId = null;
        let countdownId = null;
        let nextSpeakTime = null;

        // Элементы управления темами
        const themeSelect = document.getElementById('themeSelect');
        const softModeCheckbox = document.getElementById('softModeCheckbox');

        // Элементы настроек таймера
        const langSelect = document.getElementById('lang');
        const intervalInput = document.getElementById('interval');
        const syncToMinuteCheckbox = document.getElementById('syncToMinute');

        // Загрузка настроек из LocalStorage
        function loadSettings() {
            if (localStorage.getItem('theme')) {
                themeSelect.value = localStorage.getItem('theme');
            }
            if (localStorage.getItem('softMode')) {
                softModeCheckbox.checked = localStorage.getItem('softMode') === 'true';
            }
            if (localStorage.getItem('lang')) {
                langSelect.value = localStorage.getItem('lang');
            }
            if (localStorage.getItem('interval')) {
                intervalInput.value = localStorage.getItem('interval');
            }
            if (localStorage.getItem('syncToMinute')) {
                syncToMinuteCheckbox.checked = localStorage.getItem('syncToMinute') === 'true';
            }
            applyTheme();
        }

        // Сохранение настроек в LocalStorage
        function saveSettings() {
            localStorage.setItem('theme', themeSelect.value);
            localStorage.setItem('softMode', softModeCheckbox.checked);
            localStorage.setItem('lang', langSelect.value);
            localStorage.setItem('interval', intervalInput.value);
            localStorage.setItem('syncToMinute', syncToMinuteCheckbox.checked);
        }

        // Применение темы
        function applyTheme() {
            const theme = themeSelect.value;
            const softMode = softModeCheckbox.checked;
            const root = document.documentElement;

            root.classList.remove('theme-dark', 'soft-mode');

            if (theme === 'dark') {
                root.classList.add('theme-dark');
            } else if (theme === 'auto') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (prefersDark) {
                    root.classList.add('theme-dark');
                }
            }

            if (softMode) {
                root.classList.add('soft-mode');
            }
        }

        // Слушатели для настроек визуальной части
        themeSelect.addEventListener('change', () => {
            applyTheme();
            saveSettings();
        });
        softModeCheckbox.addEventListener('change', () => {
            applyTheme();
            saveSettings();
        });

        // Слушатели для остальных настроек
        langSelect.addEventListener('change', saveSettings);
        intervalInput.addEventListener('change', saveSettings);
        syncToMinuteCheckbox.addEventListener('change', saveSettings);

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (themeSelect.value === 'auto') {
                applyTheme();
            }
        });

        // Функция для загрузки случайной цитаты на русском языке
        function loadQuote() {
            const script = document.createElement('script');
            // Используем JSONP для обхода ограничений CORS на клиенте
            script.src = 'https://api.forismatic.com/api/1.0/?method=getQuote&format=jsonp&lang=ru&jsonp=displayQuote';
            document.body.appendChild(script);
            // Удаляем временный скрипт после загрузки
            script.onload = () => script.remove();
        }

        // Коллбэк для обработки JSONP ответа с цитатой
        window.displayQuote = function(data) {
            const quoteText = data.quoteText ? data.quoteText.trim() : '';
            const quoteAuthor = data.quoteAuthor ? data.quoteAuthor.trim() : 'Неизвестный автор';
            
            if (quoteText) {
                document.getElementById('quote-text').textContent = `«${quoteText}»`;
                document.getElementById('quote-author').textContent = `— ${quoteAuthor}`;
                document.getElementById('quote-container').style.display = 'block';
            }
        };

        function getSpeakingTextRU(date) {
            const hours = date.getHours();
            const minutes = date.getMinutes();
            
            let hoursStr = '';
            if (hours === 0) hoursStr = 'ноль часов';
            else if (hours === 1 || hours === 21) hoursStr = hours + ' час';
            else if ((hours >= 2 && hours <= 4) || (hours >= 22 && hours <= 23)) hoursStr = hours + ' часа';
            else hoursStr = hours + ' часов';

            let minutesStr = '';
            if (minutes === 0) {
                minutesStr = 'ровно';
            } else if (minutes === 1 || minutes === 21 || minutes === 31 || minutes === 41 || minutes === 51) {
                minutesStr = minutes + ' минута';
            } else if ((minutes >= 2 && minutes <= 4) || (minutes >= 22 && minutes <= 24) || (minutes >= 32 && minutes <= 34) || (minutes >= 42 && minutes <= 44) || (minutes >= 52 && minutes <= 54)) {
                minutesStr = minutes + ' минуты';
            } else {
                minutesStr = minutes + ' минут';
            }

            return `Время ${hoursStr} ${minutesStr}`;
        }

        function getSpeakingTextEN(date) {
            const hours = date.getHours();
            const minutes = date.getMinutes();
            const period = hours >= 12 ? 'PM' : 'AM';
            const displayHours = hours % 12 || 12;
            const displayMinutes = minutes < 10 ? '0' + minutes : minutes;
            return `The time is ${displayHours} ${displayMinutes} ${period}`;
        }

        function getSpeakingTextES(date) {
            const hours = date.getHours();
            const minutes = date.getMinutes();
            
            let hourWord = hours === 1 || hours === 13 ? 'la una' : `las ${hours % 12 || 12}`;
            let minWord = '';
            
            if (minutes === 0) {
                minWord = 'en punto';
            } else if (minutes === 30) {
                minWord = 'y media';
            } else if (minutes === 15) {
                minWord = 'y cuarto';
            } else {
                minWord = `y ${minutes}`;
            }
            
            return `Son ${hourWord} ${minWord}`;
        }

        function speakTime() {
            const now = new Date();
            const lang = langSelect.value;
            let text = '';
            let langCode = 'ru-RU';

            if (lang === 'ru') {
                text = getSpeakingTextRU(now);
                langCode = 'ru-RU';
            } else if (lang === 'en') {
                text = getSpeakingTextEN(now);
                langCode = 'en-US';
            } else if (lang === 'es') {
                text = getSpeakingTextES(now);
                langCode = 'es-ES';
            }

            document.getElementById('subtitle').textContent = text;

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = langCode;

            const voices = window.speechSynthesis.getVoices();
            const matchingVoice = voices.find(voice => voice.lang.startsWith(lang));
            if (matchingVoice) {
                utterance.voice = matchingVoice;
            }

            window.speechSynthesis.speak(utterance);
        }

        function updateCountdown() {
            if (!nextSpeakTime) return;
            const now = Date.now();
            const diff = nextSpeakTime - now;

            if (diff <= 0) {
                document.getElementById('countdown').textContent = "00:00";
                return;
            }

            const totalSeconds = Math.ceil(diff / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;

            const minStr = String(minutes).padStart(2, '0');
            const secStr = String(seconds).padStart(2, '0');
            document.getElementById('countdown').textContent = `${minStr}:${secStr}`;
        }

        function scheduleNextTimer(intervalMinutes, syncToMinute) {
            const intervalMs = intervalMinutes * 60 * 1000;
            const now = Date.now();
            
            let delay = intervalMs;
            if (syncToMinute) {
                const currentSeconds = new Date().getSeconds();
                const currentMs = new Date().getMilliseconds();
                const msPassedInCurrentMinute = (currentSeconds * 1000) + currentMs;
                
                delay = (60 * 1000) - msPassedInCurrentMinute + ((intervalMinutes - 1) * 60 * 1000);
                
                if (delay <= 0) {
                    delay = intervalMs;
                }
            }

            nextSpeakTime = now + delay;
            updateCountdown();

            timerId = setTimeout(() => {
                speakTime();
                scheduleNextTimer(intervalMinutes, syncToMinute);
            }, delay);
        }

        document.getElementById('startBtn').onclick = () => {
            const minutes = parseFloat(intervalInput.value);
            if (isNaN(minutes) || minutes <= 0) return;

            const syncToMinute = syncToMinuteCheckbox.checked;

            speakTime(); 
            scheduleNextTimer(minutes, syncToMinute);

            countdownId = setInterval(updateCountdown, 1000);
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        };

        document.getElementById('stopBtn').onclick = () => {
            clearTimeout(timerId);
            clearInterval(countdownId);
            nextSpeakTime = null;
            document.getElementById('countdown').textContent = "--:--";
            document.getElementById('subtitle').textContent = "";
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        };

        // Инициализация при загрузке страницы
        loadSettings();
        loadQuote(); // Подгружаем случайную цитату на русском

        if (typeof window !== 'undefined' && window.speechSynthesis) {
            window.speechSynthesis.getVoices();
        }
    </script>
</body>
</html>
