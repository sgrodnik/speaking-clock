<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Говорящие часы</title>
    <style>
        /* CSS-переменные для легкого переключения тем */
        :root {
            /* Авто/Светлая тема (по умолчанию) */
            --bg-color: #f5f5f5;
            --text-color: #111;
            --border-color: #ccc;
            --muted-color: #666;
            --btn-hover: #e0e0e0;
        }

        /* Темная тема по умолчанию для темного режима */
        :root.theme-dark {
            --bg-color: #111;
            --text-color: #eee;
            --border-color: #444;
            --muted-color: #888;
            --btn-hover: #333;
        }

        /* Мягкий режим для светлой темы */
        :root.soft-mode {
            --bg-color: #eae6df; /* мягкий теплый фон сепии */
            --text-color: #4a4740; /* приглушенный темно-серый */
            --border-color: #cdc7bd;
            --muted-color: #8c8577;
            --btn-hover: #dfd9ce;
        }

        /* Мягкий режим для темной темы */
        :root.theme-dark.soft-mode {
            --bg-color: #1e1e1e; /* не такой глубокий черный */
            --text-color: #aba49c; /* мягкий приглушенный серый */
            --border-color: #383838;
            --muted-color: #706d68;
            --btn-hover: #292929;
        }

        body {
            font-family: monospace;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-size: 1.2rem;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        main {
            border: 1px dashed var(--border-color);
            padding: 30px;
            text-align: center;
            min-width: 320px;
            max-width: 500px;
            background: transparent;
        }
        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .controls {
            margin: 25px 0;
        }
        .control-group {
            margin-bottom: 15px;
        }
        #countdown {
            font-size: 3rem;
            margin: 20px 0;
            color: var(--muted-color);
            font-weight: bold;
        }
        #subtitle {
            font-size: 1rem;
            color: var(--muted-color);
            margin-bottom: 15px;
            min-height: 1.2em;
        }
        #quote-container {
            font-size: 0.95rem;
            font-style: italic;
            border-top: 1px dashed var(--border-color);
            margin-top: 25px;
            padding-top: 20px;
            color: var(--muted-color);
            line-height: 1.4;
        }
        #quote-author {
            display: block;
            margin-top: 5px;
            font-size: 0.85rem;
            font-weight: bold;
            text-align: right;
        }
        input, select {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px;
            font-family: monospace;
            font-size: 1.1rem;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        input[type="number"] {
            width: 60px;
            text-align: center;
        }
        input[type="checkbox"] {
            transform: scale(1.3);
            vertical-align: middle;
            margin-right: 5px;
            cursor: pointer;
        }
        button {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            font-family: monospace;
            font-size: 1.2rem;
            cursor: pointer;
            margin: 5px;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        button:hover:not(:disabled) {
            background: var(--btn-hover);
        }
        button:disabled {
            color: var(--muted-color);
            border-color: var(--border-color);
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <main>
        <h2>Говорящие часы</h2>
        
        <div class="controls">
            <div class="control-group">
                <label>Тема: 
                    <select id="themeSelect">
                        <option value="auto">Авто</option>
                        <option value="light">День</option>
                        <option value="dark">Ночь</option>
                    </select>
                </label>
            </div>
            <div class="control-group">
                <label>
                    <input type="checkbox" id="softModeCheckbox">
                    Мягкий режим
                </label>
            </div>
            <div class="control-group">
                <label>Язык: 
                    <select id="lang">
                        <option value="ru" selected>Русский</option>
                        <option value="en">English</option>
                        <option value="es">Español</option>
                    </select>
                </label>
            </div>
            <div class="control-group">
                <label>Интервал (мин): <input type="number" id="interval" value="1" min="1"></label>
            </div>
            <div class="control-group">
                <label>
                    <input type="checkbox" id="syncToMinute" checked>
                    Синхронизировать в 00 сек.
                </label>
            </div>
        </div>

        <div id="countdown">--:--</div>
        <div id="subtitle"></div>

        <div>
            <button id="startBtn">Старт</button>
            <button id="stopBtn" disabled>Стоп</button>
        </div>

        <!-- Контейнер для цитаты -->
        <div id="quote-container" style="display: none;">
            <span id="quote-text"></span>
            <span id="quote-author"></span>
        </div>
    </main>

    <script>
        let timerId = null;
        let countdownId = null;
        let nextSpeakTime = null;

        const localQuotes = [
            { text: "Время — лучший лекарь, но плохой косметолог.", author: "Эмилия Квест" },
            { text: "Хотели как лучше, а получилось как всегда.", author: "Виктор Черномырдин" },
            { text: "Отродясь такого не было, и вот опять.", author: "Виктор Черномырдин" },
            { text: "Время летит — это плохая новость. Хорошая новость — вы пилот своего времени.", author: "Майкл Альтшулер" },
            { text: "Есть какая-то злая ирония в том, что интернет был создан для экономии времени.", author: "Народная мудрость" },
            { text: "Счастливые часов не наблюдают.", author: "Александр Грибоедов" },
            { text: "Обычные люди думают, как потратить время, великие — как его использовать.", author: "Артур Шопенгауэр" },
            { text: "Ничто так не экономит время и деньги, как взаимная неприязнь с первого взгляда.", author: "Янина Ипохорская" },
            { text: "Раскаяться никогда не поздно, а согрешить можно и опоздать.", author: "Евгений Кащеев" },
            { text: "Время тянется так медленно, а проходит так быстро.", author: "Алиса в Стране чудес" },
            { text: "Не откладывай на завтра то, что можешь сделать послезавтра.", author: "Марк Твен" },
            { text: "Время — это единственное, что нельзя одолжить у соседа.", author: "Народное наблюдение" },
            { text: "Жизнь слишком коротка, чтобы тратить её на чтение инструкций.", author: "Закон Мерфи" },
            { text: "Минута — это очень много, смотря с какой стороны двери туалета вы находитесь.", author: "Закон Мерфи" },
            { text: "Кто понял жизнь, тот больше не спешит.", author: "Омар Хайям" },
            { text: "Если ничто другое не помогает, прочтите, наконец, инструкцию.", author: "Аксиома Кана" },
            { text: "Деньги приходят и уходят, а время только уходит.", author: "Житейская правда" },
            { text: "Самая большая глупость — это делать то же самое и надеяться на другой результат.", author: "Альберт Эйнштейн" },
            { text: "Если хочешь рассмешить Бога, расскажи ему о своих планах.", author: "Вуди Аллен" },
            { text: "Жизнь — это то, что с нами происходит, пока мы строим планы.", author: "Джон Леннон" },
            { text: "Терпение и время дают больше, чем сила или страсть.", author: "Жан де Лафонтен" },
            { text: "Существует две бесконечные вещи: вселенная и человеческая глупость. Впрочем, насчёт вселенной я не уверен.", author: "Альберт Эйнштейн" },
            { text: "Всё пройдёт. И это тоже пройдёт.", author: "Надпись на кольце царя Соломона" },
            { text: "Никогда не откладывай на завтра то, что можно не делать вовсе.", author: "Сидни Эдди" },
            { text: "Единственный способ убить время — это работать.", author: "Дон Маркис" },
            { text: "В конце концов, всё будет хорошо. Если не хорошо — значит, это ещё не конец.", author: "Оскар Уайльд" },
            { text: "Лучший способ предсказать будущее — придумать его.", author: "Алан Кей" },
            { text: "Неважно, как медленно ты идёшь, главное — не останавливаться.", author: "Конфуций" },
            { text: "Если долго сидеть у реки, то можно увидеть, как мимо проплывёт труп твоего врага.", author: "Конфуций" },
            { text: "Работа — самый надёжный способ убить время.", author: "Бернард Шоу" },
            { text: "Пять минут до конца рабочего дня тянутся дольше, чем весь рабочий день.", author: "Закон Мерфи" },
            { text: "Время, проведённое за рыбалкой, не вычитается из жизни.", author: "Народная мудрость" },
            { text: "Совершенно необязательно вылезать из постели прямо с утра.", author: "Марк Твен" },
            { text: "Рано или поздно всё становится понятным. Иногда — слишком поздно.", author: "Народная мудрость" },
            { text: "Лучше опоздать, чем прийти некрасивым.", author: "Народная мудрость" },
            { text: "Чем быстрее идёт время, тем медленнее движется очередь.", author: "Закон Мерфи" },
            { text: "Нет смысла торопиться, если идёшь не в ту сторону.", author: "Чеширский Кот" },
            { text: "Полчаса до дедлайна — лучший мотиватор в мире.", author: "Студенческая мудрость" },
            { text: "Одна минута опоздания — это вовремя. Вовремя — это уже слишком рано.", author: "Принцип опоздальщика" },
            { text: "Прошлого не вернуть. Будущее не наступит. Настоящее — это то, что сейчас отвлекает.", author: "Закон прокрастинации" },
            { text: "Торопись медленно.", author: "Август Октавиан" },
            { text: "В молодости мы торопимся жить. К старости понимаем, что надо было ещё больше торопиться.", author: "Народное наблюдение" },
            { text: "Хороший план сегодня лучше, чем идеальный план завтра.", author: "Джордж Паттон" },
            { text: "Лучше сделать и пожалеть, чем не сделать и тоже пожалеть.", author: "Народная мудрость" },
            { text: "Первые сорок лет детства — самые трудные.", author: "Народная мудрость" },
            { text: "Возраст — это просто число. Обычно большое.", author: "Народная мудрость" },
            { text: "Никогда не бывает так плохо, чтобы не могло стать ещё хуже.", author: "Закон Мерфи" },
            { text: "Если что-то может пойти не так — оно пойдёт не так.", author: "Закон Мерфи" },
            { text: "Если у вас всё идёт хорошо, вы просто чего-то не заметили.", author: "Следствие закона Мерфи" },
            { text: "Время — деньги. Деньги — время. Нет ни того ни другого.", author: "Городская поговорка" },
            { text: "Планирование — это искусство заменять случайность ошибкой.", author: "Народная мудрость" },
            { text: "Сон — лучшее из всего, что бесплатно.", author: "Народная мудрость" },
            { text: "Будь проще, и люди к тебе потянутся. Будь ещё проще — и потянутся другие люди.", author: "Народная мудрость" },
            { text: "Инициатива наказуема.", author: "Народная мудрость" },
            { text: "Незаменимых нет, но некоторых не хочется заменять.", author: "Народная мудрость" },
            { text: "Одни живут, чтобы работать, другие работают, чтобы жить. Третьи просто мечтают о пенсии.", author: "Народная мудрость" },
            { text: "Лучший отдых — это смена деятельности. Особенно если новая деятельность — сон.", author: "Народная мудрость" },
            { text: "Суббота — день, когда понимаешь, что в воскресенье тоже ничего не успеешь.", author: "Народная мудрость" },
            { text: "Понедельник — тяжёлый день. Но вторник — это понедельник недели.", author: "Офисная мудрость" },
            { text: "Самый эффективный способ успеть всё — не брать на себя лишнего.", author: "Народная мудрость" },
            { text: "Время есть всегда. Просто не всегда на то, что нужно.", author: "Народная мудрость" },
            { text: "Две вещи бесконечны: Вселенная и список дел. Хотя насчёт Вселенной я не уверен.", author: "По мотивам Эйнштейна" },
            { text: "Тот, кто рано встаёт, зевает весь день.", author: "Народная мудрость" },
            { text: "Нельзя управлять временем, можно только управлять собой. А это куда сложнее.", author: "Питер Друкер" },
            { text: "Поспешишь — людей насмешишь. Не поспешишь — опоздаешь.", author: "Народная мудрость" },
            { text: "Идеальный момент для начала — прямо сейчас. Идеальный момент для завершения — тоже сейчас, но немного позже.", author: "Закон прокрастинации" },
            { text: "Ничто так не проясняет мышление, как дедлайн через час.", author: "Офисная мудрость" },
            { text: "Как только вы решили, что у вас есть время, оно заканчивается.", author: "Народная мудрость" },
            { text: "Хочешь сделать что-то хорошо — дай задание занятому человеку.", author: "Народная мудрость" },
            { text: "Нет ничего более постоянного, чем временное.", author: "Народная мудрость" },
            { text: "Чем дольше смотришь на список задач, тем короче он не становится.", author: "Закон Мерфи" },
            { text: "Встань пораньше — увидишь больше рассветов. Ляг попозже — увидишь больше закатов.", author: "Народная мудрость" },
            { text: "Всё самое важное в жизни происходит внезапно и не вовремя.", author: "Народная мудрость" },
            { text: "Хорошее дело само себя не сделает. Но и плохое тоже, если не стараться.", author: "Народная мудрость" },
            { text: "Опыт — это то, что получаешь сразу после того, как он тебе был нужен.", author: "Народная мудрость" },
            { text: "Мудрый человек не суетится. Просто делает вид, что всё под контролем.", author: "Народная мудрость" }
        ];

        // Элементы управления темами
        const themeSelect = document.getElementById('themeSelect');
        const softModeCheckbox = document.getElementById('softModeCheckbox');

        // Элементы настроек таймера
        const langSelect = document.getElementById('lang');
        const intervalInput = document.getElementById('interval');
        const syncToMinuteCheckbox = document.getElementById('syncToMinute');

        // Загрузка настроек из LocalStorage
        function loadSettings() {
            if (localStorage.getItem('theme')) {
                themeSelect.value = localStorage.getItem('theme');
            }
            if (localStorage.getItem('softMode')) {
                softModeCheckbox.checked = localStorage.getItem('softMode') === 'true';
            }
            if (localStorage.getItem('lang')) {
                langSelect.value = localStorage.getItem('lang');
            }
            if (localStorage.getItem('interval')) {
                intervalInput.value = localStorage.getItem('interval');
            }
            if (localStorage.getItem('syncToMinute')) {
                syncToMinuteCheckbox.checked = localStorage.getItem('syncToMinute') === 'true';
            }
            applyTheme();
        }

        // Сохранение настроек в LocalStorage
        function saveSettings() {
            localStorage.setItem('theme', themeSelect.value);
            localStorage.setItem('softMode', softModeCheckbox.checked);
            localStorage.setItem('lang', langSelect.value);
            localStorage.setItem('interval', intervalInput.value);
            localStorage.setItem('syncToMinute', syncToMinuteCheckbox.checked);
        }

        // Применение темы
        function applyTheme() {
            const theme = themeSelect.value;
            const softMode = softModeCheckbox.checked;
            const root = document.documentElement;

            root.classList.remove('theme-dark', 'soft-mode');

            if (theme === 'dark') {
                root.classList.add('theme-dark');
            } else if (theme === 'auto') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (prefersDark) {
                    root.classList.add('theme-dark');
                }
            }

            if (softMode) {
                root.classList.add('soft-mode');
            }
        }

        // Слушатели для настроек визуальной части
        themeSelect.addEventListener('change', () => {
            applyTheme();
            saveSettings();
        });
        softModeCheckbox.addEventListener('change', () => {
            applyTheme();
            saveSettings();
        });

        // Слушатели для остальных настроек
        langSelect.addEventListener('change', saveSettings);
        intervalInput.addEventListener('change', saveSettings);
        syncToMinuteCheckbox.addEventListener('change', saveSettings);

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (themeSelect.value === 'auto') {
                applyTheme();
            }
        });

        // Функция ротации цитат по порядку (сохраняет текущий индекс в LocalStorage)
        function displayNextQuote() {
            let currentIndex = parseInt(localStorage.getItem('quoteIndex') || '0', 10);
            
            // Если индекс вышел за пределы массива, сбрасываем его
            if (currentIndex >= localQuotes.length || currentIndex < 0) {
                currentIndex = 0;
            }

            const quote = localQuotes[currentIndex];
            
            document.getElementById('quote-text').textContent = `«${quote.text}»`;
            document.getElementById('quote-author').textContent = `— ${quote.author}`;
            document.getElementById('quote-container').style.display = 'block';

            // Инкрементируем и сохраняем индекс для следующего раза
            localStorage.setItem('quoteIndex', (currentIndex + 1) % localQuotes.length);
        }

        function getSpeakingTextRU(date) {
            const hours = date.getHours();
            const minutes = date.getMinutes();
            
            let hoursStr = '';
            if (hours === 0) hoursStr = 'ноль часов';
            else if (hours === 1 || hours === 21) hoursStr = hours + ' час';
            else if ((hours >= 2 && hours <= 4) || (hours >= 22 && hours <= 23)) hoursStr = hours + ' часа';
            else hoursStr = hours + ' часов';

            let minutesStr = '';
            if (minutes === 0) {
                minutesStr = 'ровно';
            } else if (minutes === 1 || minutes === 21 || minutes === 31 || minutes === 41 || minutes === 51) {
                minutesStr = minutes + ' минута';
            } else if ((minutes >= 2 && minutes <= 4) || (minutes >= 22 && minutes <= 24) || (minutes >= 32 && minutes <= 34) || (minutes >= 42 && minutes <= 44) || (minutes >= 52 && minutes <= 54)) {
                minutesStr = minutes + ' минуты';
            } else {
                minutesStr = minutes + ' минут';
            }

            return `Время ${hoursStr} ${minutesStr}`;
        }

        function getSpeakingTextEN(date) {
            const hours = date.getHours();
            const minutes = date.getMinutes();
            const period = hours >= 12 ? 'PM' : 'AM';
            const displayHours = hours % 12 || 12;
            const displayMinutes = minutes < 10 ? '0' + minutes : minutes;
            return `The time is ${displayHours} ${displayMinutes} ${period}`;
        }

        function getSpeakingTextES(date) {
            const hours = date.getHours();
            const minutes = date.getMinutes();
            
            let hourWord = hours === 1 || hours === 13 ? 'la una' : `las ${hours % 12 || 12}`;
            let minWord = '';
            
            if (minutes === 0) {
                minWord = 'en punto';
            } else if (minutes === 30) {
                minWord = 'y media';
            } else if (minutes === 15) {
                minWord = 'y cuarto';
            } else {
                minWord = `y ${minutes}`;
            }
            
            return `Son ${hourWord} ${minWord}`;
        }

        function speakTime() {
            const now = new Date();
            const lang = langSelect.value;
            let text = '';
            let langCode = 'ru-RU';

            if (lang === 'ru') {
                text = getSpeakingTextRU(now);
                langCode = 'ru-RU';
            } else if (lang === 'en') {
                text = getSpeakingTextEN(now);
                langCode = 'en-US';
            } else if (lang === 'es') {
                text = getSpeakingTextES(now);
                langCode = 'es-ES';
            }

            document.getElementById('subtitle').textContent = text;

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = langCode;

            const voices = window.speechSynthesis.getVoices();
            const matchingVoice = voices.find(voice => voice.lang.startsWith(lang));
            if (matchingVoice) {
                utterance.voice = matchingVoice;
            }

            window.speechSynthesis.speak(utterance);
        }

        function updateCountdown() {
            if (!nextSpeakTime) return;
            const now = Date.now();
            const diff = nextSpeakTime - now;

            if (diff <= 0) {
                document.getElementById('countdown').textContent = "00:00";
                return;
            }

            const totalSeconds = Math.ceil(diff / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;

            const minStr = String(minutes).padStart(2, '0');
            const secStr = String(seconds).padStart(2, '0');
            document.getElementById('countdown').textContent = `${minStr}:${secStr}`;
        }

        function scheduleNextTimer(intervalMinutes, syncToMinute) {
            const intervalMs = intervalMinutes * 60 * 1000;
            const now = Date.now();
            
            let delay = intervalMs;
            if (syncToMinute) {
                const currentSeconds = new Date().getSeconds();
                const currentMs = new Date().getMilliseconds();
                const msPassedInCurrentMinute = (currentSeconds * 1000) + currentMs;
                
                delay = (60 * 1000) - msPassedInCurrentMinute + ((intervalMinutes - 1) * 60 * 1000);
                
                if (delay <= 0) {
                    delay = intervalMs;
                }
            }

            nextSpeakTime = now + delay;
            updateCountdown();

            timerId = setTimeout(() => {
                speakTime();
                scheduleNextTimer(intervalMinutes, syncToMinute);
            }, delay);
        }

        document.getElementById('startBtn').onclick = () => {
            const minutes = parseFloat(intervalInput.value);
            if (isNaN(minutes) || minutes <= 0) return;

            const syncToMinute = syncToMinuteCheckbox.checked;

            speakTime(); 
            scheduleNextTimer(minutes, syncToMinute);

            countdownId = setInterval(updateCountdown, 1000);
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        };

        document.getElementById('stopBtn').onclick = () => {
            clearTimeout(timerId);
            clearInterval(countdownId);
            nextSpeakTime = null;
            document.getElementById('countdown').textContent = "--:--";
            document.getElementById('subtitle').textContent = "";
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        };

        // Инициализация при загрузке страницы
        loadSettings();
        displayNextQuote(); // Вызываем ротацию цитаты по порядку

        if (typeof window !== 'undefined' && window.speechSynthesis) {
            window.speechSynthesis.getVoices();
        }
    </script>
</body>
</html>
