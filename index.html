<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Говорящий таймер</title>
    <style>
        body {
            font-family: monospace;
            background: #111;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-size: 1.2rem;
        }
        main {
            border: 1px dashed #444;
            padding: 30px;
            text-align: center;
            min-width: 320px;
        }
        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .controls {
            margin: 25px 0;
        }
        .control-group {
            margin-bottom: 15px;
        }
        #countdown {
            font-size: 3rem;
            margin: 20px 0;
            color: #888;
            font-weight: bold;
        }
        #subtitle {
            font-size: 1rem;
            color: #666;
            margin-bottom: 15px;
            min-height: 1.2em;
        }
        input, select {
            background: #222;
            color: #eee;
            border: 1px solid #444;
            padding: 8px;
            font-family: monospace;
            font-size: 1.1rem;
        }
        input[type="number"] {
            width: 60px;
            text-align: center;
        }
        input[type="checkbox"] {
            transform: scale(1.3);
            vertical-align: middle;
            margin-right: 5px;
            cursor: pointer;
        }
        button {
            background: #222;
            color: #eee;
            border: 1px solid #444;
            padding: 12px 24px;
            font-family: monospace;
            font-size: 1.2rem;
            cursor: pointer;
            margin: 5px;
        }
        button:hover:not(:disabled) {
            background: #333;
        }
        button:disabled {
            color: #555;
            border-color: #222;
            cursor: not-allowed;
        }
    </style>
    <!-- Подключаем библиотеку Puter.js для облачного AI TTS -->
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>

    <main>
        <h2>Говорящий таймер</h2>
        
        <div class="controls">
            <div class="control-group">
                <label>Язык: 
                    <select id="lang">
                        <option value="ru" selected>Русский</option>
                        <option value="en">English</option>
                        <option value="es">Español</option>
                    </select>
                </label>
            </div>
            <div class="control-group">
                <label>Интервал (мин): <input type="number" id="interval" value="1" min="1"></label>
            </div>
            <div class="control-group">
                <label>
                    <input type="checkbox" id="syncToMinute" checked>
                    Синхронизировать в 00 сек.
                </label>
            </div>
        </div>

        <div id="countdown">--:--</div>
        <div id="subtitle"></div>

        <div>
            <button id="startBtn">Старт</button>
            <button id="stopBtn" disabled>Стоп</button>
        </div>
    </main>

    <script>
        let timerId = null;
        let countdownId = null;
        let nextSpeakTime = null;
        let currentAudio = null;

        function getSpeakingTextRU(date) {
            const hours = date.getHours();
            const minutes = date.getMinutes();
            
            let hoursStr = '';
            if (hours === 0) hoursStr = 'ноль часов';
            else if (hours === 1 || hours === 21) hoursStr = hours + ' час';
            else if ((hours >= 2 && hours <= 4) || (hours >= 22 && hours <= 23)) hoursStr = hours + ' часа';
            else hoursStr = hours + ' часов';

            let minutesStr = '';
            if (minutes === 0) {
                minutesStr = 'ровно';
            } else if (minutes === 1 || minutes === 21 || minutes === 31 || minutes === 41 || minutes === 51) {
                minutesStr = minutes + ' минута';
            } else if ((minutes >= 2 && minutes <= 4) || (minutes >= 22 && minutes <= 24) || (minutes >= 32 && minutes <= 34) || (minutes >= 42 && minutes <= 44) || (minutes >= 52 && minutes <= 54)) {
                minutesStr = minutes + ' минуты';
            } else {
                minutesStr = minutes + ' минут';
            }

            return `Время ${hoursStr} ${minutesStr}`;
        }

        function getSpeakingTextEN(date) {
            const hours = date.getHours();
            const minutes = date.getMinutes();
            const period = hours >= 12 ? 'PM' : 'AM';
            const displayHours = hours % 12 || 12;
            const displayMinutes = minutes < 10 ? '0' + minutes : minutes;
            return `The time is ${displayHours} ${displayMinutes} ${period}`;
        }

        function getSpeakingTextES(date) {
            const hours = date.getHours();
            const minutes = date.getMinutes();
            
            let hourWord = hours === 1 || hours === 13 ? 'la una' : `las ${hours % 12 || 12}`;
            let minWord = '';
            
            if (minutes === 0) {
                minWord = 'en punto';
            } else if (minutes === 30) {
                minWord = 'y media';
            } else if (minutes === 15) {
                minWord = 'y cuarto';
            } else {
                minWord = `y ${minutes}`;
            }
            
            return `Son ${hourWord} ${minWord}`;
        }

        async function speakTime() {
            const now = new Date();
            const lang = document.getElementById('lang').value;
            let text = '';

            if (lang === 'ru') {
                text = getSpeakingTextRU(now);
            } else if (lang === 'en') {
                text = getSpeakingTextEN(now);
            } else if (lang === 'es') {
                text = getSpeakingTextES(now);
            }

            // Выводим текст озвучки на экран
            document.getElementById('subtitle').textContent = text;

            try {
                // Используем Puter AI Text-to-Speech
                // Доступные языки передаются в запросе
                const audio = await puter.ai.txt2speech(text, lang);
                
                // Если играет предыдущая аудиозапись, останавливаем её
                if (currentAudio) {
                    currentAudio.pause();
                }
                
                currentAudio = audio;
                audio.play();
            } catch (err) {
                console.error("Ошибка Puter.js TTS:", err);
                
                // Резервный фолбек на браузерный TTS на случай оффлайна или сбоя сети
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang === 'ru' ? 'ru-RU' : (lang === 'en' ? 'en-US' : 'es-ES');
                window.speechSynthesis.speak(utterance);
            }
        }

        function updateCountdown() {
            if (!nextSpeakTime) return;
            const now = Date.now();
            const diff = nextSpeakTime - now;

            if (diff <= 0) {
                document.getElementById('countdown').textContent = "00:00";
                return;
            }

            const totalSeconds = Math.ceil(diff / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;

            const minStr = String(minutes).padStart(2, '0');
            const secStr = String(seconds).padStart(2, '0');
            document.getElementById('countdown').textContent = `${minStr}:${secStr}`;
        }

        function scheduleNextTimer(intervalMinutes, syncToMinute) {
            const intervalMs = intervalMinutes * 60 * 1000;
            const now = Date.now();
            
            let delay = intervalMs;
            if (syncToMinute) {
                const currentSeconds = new Date().getSeconds();
                const currentMs = new Date().getMilliseconds();
                const msPassedInCurrentMinute = (currentSeconds * 1000) + currentMs;
                
                delay = (60 * 1000) - msPassedInCurrentMinute + ((intervalMinutes - 1) * 60 * 1000);
                
                if (delay <= 0) {
                    delay = intervalMs;
                }
            }

            nextSpeakTime = now + delay;
            updateCountdown();

            timerId = setTimeout(() => {
                speakTime();
                scheduleNextTimer(intervalMinutes, syncToMinute);
            }, delay);
        }

        document.getElementById('startBtn').onclick = () => {
            const minutes = parseFloat(document.getElementById('interval').value);
            if (isNaN(minutes) || minutes <= 0) return;

            const syncToMinute = document.getElementById('syncToMinute').checked;

            speakTime(); 
            scheduleNextTimer(minutes, syncToMinute);

            countdownId = setInterval(updateCountdown, 1000);
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        };

        document.getElementById('stopBtn').onclick = () => {
            clearTimeout(timerId);
            clearInterval(countdownId);
            nextSpeakTime = null;
            document.getElementById('countdown').textContent = "--:--";
            document.getElementById('subtitle').textContent = "";
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        };
    </script>
</body>
</html>
