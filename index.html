<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Говорящий таймер</title>
    <style>
        body {
            font-family: monospace;
            background: #111;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        main {
            border: 1px dashed #444;
            padding: 20px;
            text-align: center;
        }
        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .controls {
            margin: 20px 0;
        }
        input {
            background: #222;
            color: #eee;
            border: 1px solid #444;
            padding: 5px;
            font-family: monospace;
            width: 50px;
            text-align: center;
        }
        button {
            background: #222;
            color: #eee;
            border: 1px solid #444;
            padding: 8px 15px;
            font-family: monospace;
            cursor: pointer;
            margin: 5px;
        }
        button:hover:not(:disabled) {
            background: #333;
        }
        button:disabled {
            color: #555;
            border-color: #222;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <main>
        <h2>Говорящий таймер</h2>
        <div class="controls">
            <label>Интервал (мин): <input type="number" id="interval" value="15" min="1"></label>
        </div>
        <div>
            <button id="startBtn">Старт</button>
            <button id="stopBtn" disabled>Стоп</button>
        </div>
    </main>

    <script>
        let timerId = null;

        function getSpeakingTimeText(date) {
            const hours = date.getHours();
            const minutes = date.getMinutes();
            
            let hoursStr = '';
            if (hours === 0) hoursStr = 'ноль часов';
            else if (hours === 1 || hours === 21) hoursStr = hours + ' час';
            else if ((hours >= 2 && hours <= 4) || (hours >= 22 && hours <= 23)) hoursStr = hours + ' часа';
            else hoursStr = hours + ' часов';

            let minutesStr = '';
            if (minutes === 0) {
                minutesStr = 'ровно';
            } else if (minutes === 1 || minutes === 21 || minutes === 31 || minutes === 41 || minutes === 51) {
                minutesStr = minutes + ' минута';
            } else if ((minutes >= 2 && minutes <= 4) || (minutes >= 22 && minutes <= 24) || (minutes >= 32 && minutes <= 34) || (minutes >= 42 && minutes <= 44) || (minutes >= 52 && minutes <= 54)) {
                minutesStr = minutes + ' минуты';
            } else {
                minutesStr = minutes + ' минут';
            }

            return `Время ${hoursStr} ${minutesStr}`;
        }

        function speakTime() {
            const now = new Date();
            const timeStr = getSpeakingTimeText(now);
            
            const utterance = new SpeechSynthesisUtterance(timeStr);
            utterance.lang = 'ru-RU';
            window.speechSynthesis.speak(utterance);
        }

        document.getElementById('startBtn').onclick = () => {
            const minutes = parseFloat(document.getElementById('interval').value);
            if (isNaN(minutes) || minutes <= 0) return;

            // Сразу озвучить при старте
            speakTime(); 
            
            // Запустить интервал (минуты переводятся в миллисекунды)
            timerId = setInterval(speakTime, minutes * 60 * 1000);
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        };

        document.getElementById('stopBtn').onclick = () => {
            clearInterval(timerId);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        };
    </script>
</body>
</html>
